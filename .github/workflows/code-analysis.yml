name: Code Analysis

on:
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/code-analysis.yml'

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4

      - name: Generate HTML report
        run: |
          ./testbench code:analyze \
            --base=origin/${{ github.base_ref }} \
            --format=html \
            --title="PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}" \
            --no-ansi \
            . report.html

      - name: Capture metrics summary
        id: metrics
        run: |
          SUMMARY=$(./testbench code:analyze \
            --base=origin/${{ github.base_ref }} \
            --format=metrics \
            --no-ansi \
            . 2>&1 || true)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare report directory
        run: |
          mkdir -p _site
          cp report.html _site/pr-${{ github.event.pull_request.number }}.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          keep_files: true

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- code-analysis-report -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const reportUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}.html`;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const metrics = `${{ steps.metrics.outputs.summary }}`;

            const body = [
              marker,
              '## Code Analysis Report',
              '',
              metrics ? `\`\`\`\n${metrics}\n\`\`\`` : '',
              '',
              `[View HTML Report](${reportUrl}) · [View Run](${runUrl})`,
              '',
              '_Automatically updated on each push._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const reportUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}.html`;
            const start = '<!-- code-analysis-start -->';
            const end = '<!-- code-analysis-end -->';
            const badge = `${start}\n📊 [Code Analysis Report](${reportUrl})\n${end}`;

            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            let description = pr.body || '';
            if (description.includes(start)) {
              description = description.replace(
                new RegExp(`${start}[\\s\\S]*?${end}`),
                badge
              );
            } else {
              description = badge + (description ? '\n\n' + description : '');
            }
            await github.rest.pulls.update({
              owner, repo, pull_number: prNumber, body: description,
            });
