name: Code Analysis

on:
  pull_request:
    paths:
      - '**.php'
      - '.github/workflows/code-analysis.yml'

concurrency:
  group: code-analysis-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    outputs:
      metrics: ${{ steps.metrics.outputs.summary }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Compute merge base
        id: merge_base
        run: echo "sha=$(git merge-base origin/${{ github.base_ref }} HEAD)" >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: pcov

      - name: Install composer dependencies
        uses: ramsey/composer-install@v4

      - name: Run tests with coverage
        run: vendor/bin/pest --coverage-xml build/coverage

      - name: Annotate PR with very high severity findings
        run: |
          ./testbench code:analyze \
            --base=${{ steps.merge_base.outputs.sha }} \
            --format=github \
            --min-severity=very_high \
            --coverage-xml=build/coverage \
            --no-ansi \
            . 2>&1 || true

      - name: Generate HTML report
        env:
          REPORT_TITLE: "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}"
        run: |
          ./testbench code:analyze \
            --base=${{ steps.merge_base.outputs.sha }} \
            --full-files \
            --format=html \
            --coverage-xml=build/coverage \
            --title="$REPORT_TITLE" \
            --no-ansi \
            . report.html

      - name: Capture metrics summary
        id: metrics
        run: |
          SUMMARY=$(./testbench code:analyze \
            --base=${{ steps.merge_base.outputs.sha }} \
            --format=metrics \
            --coverage-xml=build/coverage \
            --no-ansi \
            . 2>&1 || true)
          echo "summary<<EOF" >> $GITHUB_OUTPUT
          echo "$SUMMARY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Prepare report directory
        run: |
          mkdir -p _site
          cp report.html _site/pr-${{ github.event.pull_request.number }}.html

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        with:
          name: pr-report-${{ github.event.pull_request.number }}
          path: _site/

  deploy:
    needs: analyze
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    concurrency:
      group: gh-pages-deploy
      cancel-in-progress: false

    steps:
      - name: Download report artifact
        uses: actions/download-artifact@v4
        with:
          name: pr-report-${{ github.event.pull_request.number }}
          path: _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          keep_files: true

  notify:
    needs: [analyze, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      pull-requests: write

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- code-analysis-report -->';
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const reportUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}.html`;
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const metrics = `${{ needs.analyze.outputs.metrics }}`;

            const body = [
              marker,
              '## Code Analysis Report',
              '',
              metrics ? `\`\`\`\n${metrics}\n\`\`\`` : '',
              '',
              `[View HTML Report](${reportUrl}) · [View Run](${runUrl})`,
              '',
              '_Automatically updated on each push._',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber,
            });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }

      - name: Update PR description
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.issue.number;
            const reportUrl = `https://${owner}.github.io/${repo}/pr-${prNumber}.html`;
            const start = '<!-- code-analysis-start -->';
            const end = '<!-- code-analysis-end -->';
            const badge = `${start}\n📊 [Code Analysis Report](${reportUrl})\n${end}`;

            const { data: pr } = await github.rest.pulls.get({
              owner, repo, pull_number: prNumber,
            });
            let description = pr.body || '';
            if (description.includes(start)) {
              description = description.replace(
                new RegExp(`${start}[\\s\\S]*?${end}`),
                badge
              );
            } else {
              description = badge + (description ? '\n\n' + description : '');
            }
            await github.rest.pulls.update({
              owner, repo, pull_number: prNumber, body: description,
            });
